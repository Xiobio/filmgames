<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
const lowEnd = matchMedia('(pointer:coarse)').matches || (navigator.hardwareConcurrency||8)<=4;   // 手机/低端：降画质保 60fps
renderer.setPixelRatio(Math.min(devicePixelRatio, lowEnd?1.5:2));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = lowEnd?THREE.PCFShadowMap:THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 1000);

// ---- 渐变天空 ----
{
  const sky = new THREE.Mesh(new THREE.SphereGeometry(500,32,16), new THREE.ShaderMaterial({
    side:THREE.BackSide, depthWrite:false,
    uniforms:{ top:{value:new THREE.Color('#7cc7ff')}, bot:{value:new THREE.Color('#eaf7ff')} },
    vertexShader:`varying vec3 vp; void main(){ vp=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`varying vec3 vp; uniform vec3 top; uniform vec3 bot; void main(){ float h=clamp(normalize(vp).y*0.5+0.5,0.0,1.0); gl_FragColor=vec4(mix(bot,top,smoothstep(0.0,0.9,h)),1.0); }`
  }));
  scene.add(sky);
}
scene.fog = new THREE.Fog(0xd9f0ff, 70, 180);

// ---- 灯光（明亮柔和）----
scene.add(new THREE.HemisphereLight(0xffffff, 0xc8e6d0, 0.95));
scene.add(new THREE.AmbientLight(0xffffff, 0.25));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.55);
sun.position.set(24,40,18); sun.castShadow = true;
sun.shadow.mapSize.set(lowEnd?1024:2048, lowEnd?1024:2048); sun.shadow.bias=-0.0004;
const sc=sun.shadow.camera; sc.near=1; sc.far=160; sc.left=-60; sc.right=60; sc.top=60; sc.bottom=-60;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xbfe0ff, 0.4); fill.position.set(-20,16,-22); scene.add(fill);

// ---- 圆形岛屿地面 ----
const ISLAND_R = 30;
const island = new THREE.Mesh(new THREE.CylinderGeometry(ISLAND_R, ISLAND_R-2.5, 4, 64),
  new THREE.MeshStandardMaterial({ color:0x9fe6b4, roughness:0.95 }));

const WORLD_NAMES=['糖果草原','棉花糖山','薄荷冰原','蜜糖落日','霓虹梦境','翡翠森林','黄金沙丘','彩虹工厂','云端天阶','庆典终焉'];

const ARCHES=[   // 地形布局原型（按关轮换，让每关结构不同）
  {radMin:0.25,radMax:1.0, hw:[1.6,2.6]},   // 散布

function genLevel(idx, salt){
  const rng=mulberry32((((idx+1)*2654435761) ^ ((salt||0)*40503))>>>0);
  const world=Math.min(9,Math.floor(idx/10)), t=idx/99, pal=PALETTES[world];
  const col=()=>pal[(rng()*pal.length)|0];
  const arch=ARCHES[(idx*7+world*3)%ARCHES.length];   // 本关地形布局原型
  const numStars=Math.round(10+t*10), R=15+t*15, maxTop=0.8+t*1.6;
  const useSprings=world>=1, useMovers=world>=2, useSpinners=world>=3;   // 按世界引入：W1跑跳→W2弹簧→W3移动→W4旋转
  const numMovers=useMovers?Math.round(0.6+t*2.2):0, numSpinners=useSpinners?Math.round((world-2)*0.3+t*2.0):0;
  const spinSpd=1.2+t*1.5, movSpd=0.4+t*0.5, movRange=3.5+t*2.5, barH=world>=6?1.4:1.1;
  const placed=DECOR_FP.map(d=>({x:d[0],z:d[1],r:d[2]}));
  const free=(x,z,r)=>{ if(Math.hypot(x,z)<5) return false; if(Math.hypot(x,z)>R-r-0.5) return false; for(const p of placed){ if(Math.hypot(x-p.x,z-p.z)<r+p.r+1.0) return false; } return true; };
  const spot=(r)=>{ const rmin=Math.max(5,R*arch.radMin), rmax=Math.max(rmin+1,Math.min(R-r-0.5,R*arch.radMax));
    for(let k=0;k<60;k++){ const a=rng()*6.2832, rad=rmin+rng()*(rmax-rmin); const x=+(Math.cos(a)*rad).toFixed(2), z=+(Math.sin(a)*rad).toFixed(2); if(free(x,z,r)){ placed.push({x,z,r}); return [x,z]; } } return null; };
  const platforms=[],movers=[],spinners=[],pads=[],stars=[]; let remaining=numStars;
  // 终点门：每关都有，先在远处地面占一个位（带兜底，保证一定有终点）
  let goalPos=null;
  for(let k=0;k<50 && !goalPos;k++){ const a=rng()*6.2832, rad=R-3-rng()*2.5, x=+(Math.cos(a)*rad).toFixed(2), z=+(Math.sin(a)*rad).toFixed(2); if(free(x,z,2.2)){ placed.push({x,z,r:2.2}); goalPos=[x,0,z]; } }
  if(!goalPos){ const s=spot(2.2); if(s) goalPos=[s[0],0,s[1]]; }
  if(!goalPos) goalPos=[+(R-5).toFixed(2),0,0];
  // 地面星
  const groundN=Math.max(1,Math.round(numStars*(0.45-t*0.28)));
  for(let i=0;i<groundN&&remaining>0;i++){ const s=spot(1.1); if(s){ stars.push([s[0],1.2,s[1]]); remaining--; } }
  // 弹簧高空星（W2 起，垂直挑战：只能踩弹簧弹上去够到）
  if(useSprings){ const padN=Math.max(1,Math.round(numStars*(0.18+t*0.12)));
    for(let i=0;i<padN&&remaining>0;i++){ const s=spot(1.9); if(s){ pads.push([s[0],s[1]]); stars.push([s[0],+(3.8+rng()*1.8).toFixed(2),s[1]]); remaining--; } } }
  // 移动平台星（W3 起）
  if(useMovers){ for(let i=0;i<numMovers&&remaining>0;i++){ const hw=1.9+rng()*0.4, hd=1.8+rng()*0.4, top=+(0.8+rng()*Math.min(maxTop-0.8,1.3)).toFixed(2), axis=rng()<0.5?'x':'z';
    const s=spot(Math.max(hw,hd)+movRange); if(s){ movers.push([s[0],s[1],+(hw*2).toFixed(2),+(hd*2).toFixed(2),top,col(),axis,+movRange.toFixed(1),+movSpd.toFixed(2)]); stars.push([s[0],+(top+1.2).toFixed(2),s[1]]); remaining--; } } }
  // 阶梯/塔结构（约一半关卡，制造垂直地形：每级从上一级可跳达）
  if((idx*3+world)%2===0 && remaining>4){ const base=spot(1.6);
    if(base){ let cx=base[0], cz=base[1], ctop=+(1.0+rng()*1.2).toFixed(2);
      platforms.push([cx,cz,2.6,2.6,ctop,col()]); stars.push([cx,+(ctop+1.0).toFixed(2),cz]); remaining--;
      const steps=2+Math.floor(rng()*3);
      for(let s=0;s<steps && remaining>3;s++){ let placedStep=false;
        for(let k=0;k<14 && !placedStep;k++){ const ang=rng()*6.2832, dist=4.0+rng()*0.6, nx=+(cx+Math.cos(ang)*dist).toFixed(2), nz=+(cz+Math.sin(ang)*dist).toFixed(2);
          if(Math.hypot(nx,nz)>5 && Math.hypot(nx,nz)<R-2.5 && free(nx,nz,1.4)){ const ntop=+(ctop+1.7+rng()*0.6).toFixed(2);
            placed.push({x:nx,z:nz,r:1.4}); platforms.push([nx,nz,2.4,2.4,ntop,col()]); stars.push([nx,+(ntop+1.0).toFixed(2),nz]); remaining--; cx=nx; cz=nz; ctop=ntop; placedStep=true; } }
        if(!placedStep) break; } } }
  // 平台星（其余）
  let guard=0;
  while(remaining>0 && guard++<300){ const hw=arch.hw[0]+rng()*(arch.hw[1]-arch.hw[0]), hd=arch.hw[0]+rng()*(arch.hw[1]-arch.hw[0]), top=+(0.8+rng()*(maxTop-0.8)).toFixed(2);
    const s=spot(Math.max(hw,hd)); if(s){ platforms.push([s[0],s[1],+(hw*2).toFixed(2),+(hd*2).toFixed(2),top,col()]); stars.push([s[0],+(top+1.0).toFixed(2),s[1]]); remaining--; } }
  // 旋转机关（W4 起，W7+ 横杆抬高更险）
  for(let i=0;i<numSpinners;i++){ const len=+(6+rng()*3.5).toFixed(1); const s=spot(len/2+0.4); if(s){ spinners.push([s[0],s[1],len,+(spinSpd*(rng()<0.5?1:-1)).toFixed(2),barH]); } }
  // 额外弹簧（趣味/兜底）
  const padTarget=useSprings?Math.round(1.5+t*1.5):1;
  for(let i=pads.length;i<padTarget;i++){ const s=spot(1.8); if(s) pads.push([s[0],s[1]]); }
  const t3=Math.round(numStars*4+R*0.4+numSpinners*2.5), t2=Math.round(numStars*7+R*0.7+numSpinners*4.5);
  return { name:WORLD_NAMES[world]+' '+(world+1)+'-'+((idx%10)+1), world, arenaR:+R.toFixed(1), thresholds:[t3,t2], platforms, movers, spinners, pads, stars, goalPos };
}
// 自检：无重叠几何（防穿模）+ 每颗星可达
function validateLevel(L){

  (L.movers||[]).forEach(m=>fp.push({x:m[0],z:m[1],r:Math.max(m[2],m[3])/2+m[7]}));
  (L.spinners||[]).forEach(s=>fp.push({x:s[0],z:s[1],r:s[2]/2}));
  (L.pads||[]).forEach(p=>fp.push({x:p[0],z:p[1],r:1.7}));
  if(!L.goalPos) return false; fp.push({x:L.goalPos[0],z:L.goalPos[2],r:2.0});
  for(let i=0;i<fp.length;i++)for(let j=i+1;j<fp.length;j++){ if(Math.hypot(fp[i].x-fp[j].x,fp[i].z-fp[j].z)<fp[i].r+fp[j].r-0.6) return false; }
  // 可达平台（链式）：top≤3 地面可跳达 → 反复扩展（从已可达平台/移动平台/弹簧 水平≤5.2 且升高≤2.6 跳上去）
  const plats=(L.platforms||[]).map(p=>({x:p[0],z:p[1],top:p[4],reach:p[4]<=3.0}));
  const movR=(L.movers||[]).filter(m=>m[4]<=3.0).map(m=>({x:m[0],z:m[1],top:m[4]}));
  let chg=true,guard=0; while(chg&&guard++<30){ chg=false; for(const p of plats){ if(p.reach)continue;
    for(const q of plats){ if(q.reach && Math.hypot(p.x-q.x,p.z-q.z)<=5.2 && (p.top-q.top)<=2.6){ p.reach=true; chg=true; break; } }
    if(!p.reach) for(const m of movR){ if(Math.hypot(p.x-m.x,p.z-m.z)<=5.2 && (p.top-m.top)<=2.6){ p.reach=true; chg=true; break; } }

function tick(dt){
  if(running){ timeMs+=dt*1000; tmEl.textContent=(timeMs/1000).toFixed(1); }
  if(combo>0 && state==='play' && timeMs-lastCollectMs>COMBO_WINDOW){ combo=0; comboEl.classList.remove('on'); }  // 连击断裂
  // 幽灵：录制本局轨迹 + 回放最佳轨迹（半透明对手同跑）
  if(running && timeMs-ghostLastSample>=100){ ghostRec.push([Math.round(timeMs),+player.position.x.toFixed(2),+player.position.y.toFixed(2),+player.position.z.toFixed(2),+player.rotation.y.toFixed(2)]); ghostLastSample=timeMs; }
  if(ghostMesh && ghostPlay && ghostPlay.length){ const t=timeMs, last=ghostPlay[ghostPlay.length-1];
    if(t<=last[0]){ let i=ghostPlay.length-1; while(i>0 && ghostPlay[i][0]>t) i--; const a=ghostPlay[i], b=ghostPlay[Math.min(i+1,ghostPlay.length-1)], f=(b[0]>a[0])?(t-a[0])/(b[0]-a[0]):0;
      ghostMesh.position.set(a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f+0.76, a[3]+(b[3]-a[3])*f); ghostMesh.rotation.y=a[4]; ghostMesh.visible=true; }
    else ghostMesh.visible=false; }
  // —— 移动平台：滑动并更新碰撞体；若正踩在上面则把豆豆一起带走 ——
  clock+=dt;

    const off=Math.sin(clock*mv.spd+mv.ph)*mv.range;
    const nx=mv.bx+(mv.axis==='x'?off:0), nz=mv.bz+(mv.axis==='z'?off:0);
    const dx=nx-mv.mesh.position.x, dz=nz-mv.mesh.position.z;
    mv.mesh.position.x=nx; mv.mesh.position.z=nz;
    mv.s.minX=nx-mv.hw; mv.s.maxX=nx+mv.hw; mv.s.minZ=nz-mv.hd; mv.s.maxZ=nz+mv.hd;
    if(groundSolid===mv.s){ player.position.x+=dx; player.position.z+=dz; }
  }
  // —— 升降梯：竖直上下，若正踩着则把豆豆一起带升降 ——
  for(const lf of lifts){

  player.position.x+=vel.x*dt; player.position.z+=vel.z*dt;

        if(d2>1e-6){ const d=Math.sqrt(d2),p=PR-d; player.position.x+=dx/d*p; player.position.z+=dz/d*p; }
        else { const ex=Math.min(player.position.x-s.minX,s.maxX-player.position.x), ez=Math.min(player.position.z-s.minZ,s.maxZ-player.position.z);
          if(ex<ez) player.position.x+=(player.position.x<(s.minX+s.maxX)/2?-1:1)*(ex+PR);
          else      player.position.z+=(player.position.z<(s.minZ+s.maxZ)/2?-1:1)*(ez+PR); }

    } else {
      let dx=player.position.x-s.x, dz=player.position.z-s.z, d=Math.hypot(dx,dz), md=s.r+PR;

    }
  }
  // —— 重力 + 竖直碰撞：只在「之前就在顶面之上」时落到顶面，高度才真正生效 ——
  if(keys.Space&&grounded)jump();
  const prevFeet=player.position.y;
  vy-=G*dt; player.position.y+=vy*dt;
  let support=(Math.hypot(player.position.x,player.position.z)<curIslandR)?0:-999, supSolid=null;   // 岛面（按关变大小）
  for(const s of solids){
    if(s.ramp){   // 斜坡：用当前位置处的坡面高度当支撑（容差放宽到 0.55，斜面上下行走顺滑、不会从下方被顶上去）
      const inFp = player.position.x>=s.minX-PR && player.position.x<=s.maxX+PR && player.position.z>=s.minZ-PR && player.position.z<=s.maxZ+PR;
      const stop = rampTop(s,player.position.x,player.position.z);
      if(inFp && prevFeet>=stop-0.55 && stop>support){ support=stop; supSolid=s; }
      continue;
    }
    const over = s.box
      ? (player.position.x>=s.minX-PR && player.position.x<=s.maxX+PR && player.position.z>=s.minZ-PR && player.position.z<=s.maxZ+PR)
      : (Math.hypot(player.position.x-s.x,player.position.z-s.z) < s.r+PR);

  }
  if(player.position.y<=support+0.001 && vy<=0){
    if(!grounded){ squashV=-Math.min(9,Math.abs(vy)*0.9); landPuff(); if(Math.abs(vy)>2) A.land(); }
    player.position.y=support; vy=0; grounded=true; groundSolid=supSolid;
    if(state==='play' && supSolid && supSolid.box && !supSolid.dyn && supSolid.top>0.6)   // 站上静态高台=记录检查点
      curCheckpoint=[(supSolid.minX+supSolid.maxX)/2, supSolid.top+0.3, (supSolid.minZ+supSolid.maxZ)/2];
    else if(state==='play' && !supSolid && curCheckpoint && curCheckpoint[1]>1.6){          // 跌回岛面=掉出赛道 → 弹回上一个检查点（长赛道才公平）
      player.position.set(curCheckpoint[0],curCheckpoint[1],curCheckpoint[2]); vel.set(0,0,0); vy=0; grounded=false; landPuff(); A.land(); }
  } else { grounded=false; groundSolid=null; }
  if(player.position.y<-20){ const rp=curCheckpoint||curSpawn; player.position.set(rp[0],Math.max(2,rp[1]),rp[2]); vy=0; vel.set(0,0,0); }   // 掉出去复位到检查点(无则起点)
  if(goalCd>0) goalCd-=dt;

    if(state==='play' && curGoal && Math.hypot(player.position.x-curGoal[0],player.position.z-curGoal[2])<1.9 && Math.abs(player.position.y-(curGoal[1]||0))<2.6){
      if(score>=total){ if(running) showWin(); }
      else if(goalCd<=0){ goalCd=1.0;   // 未集齐就到终点 → 惩罚：击退 + 扣时间 + 提示
        const dx=player.position.x-curGoal[0], dz=player.position.z-curGoal[2], d=Math.hypot(dx,dz)||1;

        const o=document.getElementById('obj'); if(o){ o.textContent='❌ 还差 '+(total-score)+' 颗 ⭐！(罚 +2s)'; o.classList.add('warn'); clearTimeout(o._t);
          o._t=setTimeout(()=>{ o.classList.remove('warn'); o.textContent=goalOpen?'🏁 终点门已开启 → 冲！':('⭐ '+score+'/'+total+' → 收齐后冲终点'); },1500); }

  // 旋转横扫机关：转动 + 命中弹飞（跳得比横杆高 / 卡时机穿过可躲）

  }

  for(const pe of pendulums){
    pe.ang=Math.sin(clock*pe.spd+pe.ph)*pe.amp;
    if(pe.axis==='x') pe.arm.rotation.z=pe.ang; else pe.arm.rotation.x=pe.ang;
    if(state!=='play'){ continue; } if(pe.cd>0){ pe.cd-=dt; continue; }

    const bz = pe.axis==='z' ? pe.z-Math.sin(pe.ang)*pe.Larm : pe.z;

  }

  let d=facing-player.rotation.y; while(d>Math.PI)d-=6.2832; while(d<-Math.PI)d+=6.2832;
  player.rotation.y+=d*Math.min(1,16*dt);
  // 冲刺扬尘

  // ---- Q 弹动画（squash & stretch + 摆腿 + 倾身）----

  squashV += (((grounded?0:stretch*10) - squash*8) - squashV*0.5)*Math.min(1,dt*14);
  squash += squashV*dt; squash=Math.max(-0.4,Math.min(0.45,squash));
  bean.scale.set(1-squash*0.55, 1+squash, 1-squash*0.55);
  walkPh += sp*dt*3.2;
  const ws = grounded?Math.min(1,sp/RUN):0;

  armL.rotation.x = -Math.sin(walkPh)*0.7*ws; armR.rotation.x=Math.sin(walkPh)*0.7*ws;
  bean.rotation.z = Math.sin(walkPh*0.5)*0.06*ws + (grounded?0:0);
  bean.rotation.x = Math.min(0.25, sp*0.02) + (grounded?Math.sin(walkPh)*0.02*ws:0);
  if(grounded&&sp<0.3){ const b=Math.sin(performance.now()*0.003); bean.position.y=b*0.03; body.position.y=0.92+b*0.02; }
  else bean.position.y=0;

    } }

}
player.position.set(0,3,0);
camera.position.set(0,6,14); camera.lookAt(0,1,0);

// ---- 后处理（MSAA 渲染目标保清晰 + 轻辉光）----
const rt = new THREE.WebGLRenderTarget(innerWidth,innerHeight,{samples:lowEnd?2:4});
const composer = new EffectComposer(renderer, rt);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), lowEnd?0.22:0.32, 0.6, 0.82));

addEventListener('resize',resize); resize();

let last=performance.now();
function loop(now){ let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05; tick(dt); composer.render(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
setTimeout(()=>document.getElementById('load').classList.add('gone'), 400);
